<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title></title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  html, body {
    width: 100%;
    background: #f5f0e8;
  }

  #feed {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 48px;
    padding: 48px 0;
  }

  .slide video {
    width: 100%;
    height: auto;
    display: block;
  }
</style>
</head>
<body>

<div id="feed">

  <div class="slide">
    <video src="bh_clip00028788.mov" muted loop playsinline></video>
  </div>

  <div class="slide">
    <video src="bh_clip00029150.mov" muted loop playsinline></video>
  </div>

  <div class="slide">
    <video src="bh_clip00030078.mov" muted loop playsinline></video>
  </div>

  <div class="slide">
    <video src="bh_clip00062196.mov" muted loop playsinline></video>
  </div>

</div>

<script>
  const feed = document.getElementById('feed');

  // autoplay/pause
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const video = entry.target.querySelector('video');
      if (!video) return;
      if (entry.isIntersecting) {
        video.play().catch(() => {});
      } else {
        video.pause();
        video.currentTime = 0;
      }
    });
  }, { threshold: 0.3 });

  function observeSlides() {
    feed.querySelectorAll('.slide').forEach(slide => observer.observe(slide));
  }
  observeSlides();

  // infinite scroll: clona il feed quando si avvicina al fondo
  const originalSlides = Array.from(feed.querySelectorAll('.slide'));

  function appendClones() {
    originalSlides.forEach(slide => {
      const clone = slide.cloneNode(true);
      feed.appendChild(clone);
    });
    observeSlides();
  }

  // appende un batch iniziale per avere abbastanza contenuto
  appendClones();
  appendClones();

  // controlla la posizione di scroll e aggiunge altri quando necessario
  window.addEventListener('scroll', () => {
    const scrollBottom = window.scrollY + window.innerHeight;
    const docHeight = document.documentElement.scrollHeight;
    if (docHeight - scrollBottom < window.innerHeight * 2) {
      appendClones();
    }
  }, { passive: true });
</script>

</body>
</html>

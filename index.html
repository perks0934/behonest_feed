<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title></title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  html, body {
    width: 100%;
    background: #e8e4e0;
  }

  #feed {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 80px;
    padding: 80px 0 160px;
  }

  .slide {
    width: 78%;
  }

  .slide video {
    width: 100%;
    height: auto;
    display: block;
  }
</style>
</head>
<body>

<div id="feed"></div>

<script>
  const SRCS = [
    'bh_clip00028788.mov',
    'bh_clip00029150.mov',
    'bh_clip00030078.mov',
    'bh_clip00062196.mov'
  ];

  const feed = document.getElementById('feed');

  // precarichiamo tutti i video una volta sola
  const videoPool = SRCS.map(src => {
    const v = document.createElement('video');
    v.src = src;
    v.muted = true;
    v.loop = true;
    v.playsInline = true;
    v.setAttribute('playsinline', '');
    v.preload = 'auto';
    return v;
  });

  function createSlide(srcIndex) {
    const slide = document.createElement('div');
    slide.className = 'slide';
    slide.dataset.src = SRCS[srcIndex];
    // clone il video element così il browser riusa la risorsa già in cache
    const v = document.createElement('video');
    v.src = SRCS[srcIndex];
    v.muted = true;
    v.loop = true;
    v.playsInline = true;
    v.setAttribute('playsinline', '');
    v.preload = 'none'; // non ricaricare, la cache fa il lavoro
    slide.appendChild(v);
    return slide;
  }

  let slideCount = 0;

  function appendBatch() {
    SRCS.forEach((_, i) => {
      const slide = createSlide(i);
      feed.appendChild(slide);
      playObserver.observe(slide);
      snapObserver.observe(slide);
      slideCount++;
    });
  }

  // ----- autoplay / pause -----
  const playObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const video = entry.target.querySelector('video');
      if (!video) return;
      if (entry.isIntersecting) {
        video.play().catch(() => {});
      } else {
        video.pause();
        video.currentTime = 0;
      }
    });
  }, { threshold: 0.3 });

  // ----- snap: quando lo scroll si ferma, centra il video più vicino -----
  let snapTimer = null;
  let snapping = false;

  const snapObserver = new IntersectionObserver(() => {}, {}); // placeholder, usiamo scroll event

  function getClosestSlide() {
    const slides = feed.querySelectorAll('.slide');
    const viewCenter = window.scrollY + window.innerHeight / 2;
    let closest = null;
    let minDist = Infinity;
    slides.forEach(slide => {
      const top = slide.getBoundingClientRect().top + window.scrollY;
      const center = top + slide.offsetHeight / 2;
      const dist = Math.abs(center - viewCenter);
      if (dist < minDist) { minDist = dist; closest = center; }
    });
    return closest;
  }

  window.addEventListener('scroll', () => {
    if (snapping) return;
    clearTimeout(snapTimer);
    snapTimer = setTimeout(() => {
      const center = getClosestSlide();
      if (center === null) return;
      const targetY = center - window.innerHeight / 2;
      snapping = true;
      window.scrollTo({ top: targetY, behavior: 'smooth' });
      setTimeout(() => { snapping = false; }, 500);
    }, 150);

    // infinite scroll
    const scrollBottom = window.scrollY + window.innerHeight;
    const docHeight = document.documentElement.scrollHeight;
    if (docHeight - scrollBottom < window.innerHeight * 2) appendBatch();
  }, { passive: true });

  // ----- autoscroll lento -----
  let autoScrollInterval = null;
  let touchActive = false;

  function startAutoScroll() {
    if (autoScrollInterval) return;
    autoScrollInterval = setInterval(() => {
      if (!touchActive && !snapping) {
        window.scrollBy(0, 0.7);
      }
    }, 16);
  }

  window.addEventListener('touchstart', () => {
    touchActive = true;
    clearTimeout(snapTimer);
  }, { passive: true });

  window.addEventListener('touchend', () => {
    // aspetta che il momentum scroll finisca prima di riattivare
    setTimeout(() => { touchActive = false; }, 1800);
  }, { passive: true });

  // primo batch + avvio
  appendBatch();
  appendBatch();
  startAutoScroll();
</script>

</body>
</html>

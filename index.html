<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title></title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  html, body {
    width: 100%;
    background: #e8e4e0;
  }

  #feed {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 80px;
    padding: 80px 0 160px;
  }

  .slide {
    width: 78%;
  }

  .slide video {
    width: 100%;
    height: auto;
    display: block;
  }
</style>
</head>
<body>

<div id="feed">

  <div class="slide">
    <video src="bh_clip00028788.mov" muted loop playsinline></video>
  </div>

  <div class="slide">
    <video src="bh_clip00029150.mov" muted loop playsinline></video>
  </div>

  <div class="slide">
    <video src="bh_clip00030078.mov" muted loop playsinline></video>
  </div>

  <div class="slide">
    <video src="bh_clip00062196.mov" muted loop playsinline></video>
  </div>

</div>

<script>
  const feed = document.getElementById('feed');

  // ----- autoplay / pause -----
  const playObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const video = entry.target.querySelector('video');
      if (!video) return;
      if (entry.isIntersecting) {
        video.play().catch(() => {});
      } else {
        video.pause();
        video.currentTime = 0;
      }
    });
  }, { threshold: 0.3 });

  function observeSlides() {
    feed.querySelectorAll('.slide:not([data-observed])').forEach(slide => {
      slide.setAttribute('data-observed', '1');
      playObserver.observe(slide);
    });
  }
  observeSlides();

  // ----- infinite scroll -----
  const originalSlides = Array.from(feed.querySelectorAll('.slide'));

  function appendClones() {
    originalSlides.forEach(slide => {
      const clone = slide.cloneNode(true);
      clone.removeAttribute('data-observed');
      feed.appendChild(clone);
    });
    observeSlides();
  }
  appendClones();
  appendClones();

  window.addEventListener('scroll', () => {
    const scrollBottom = window.scrollY + window.innerHeight;
    const docHeight = document.documentElement.scrollHeight;
    if (docHeight - scrollBottom < window.innerHeight * 2) appendClones();
  }, { passive: true });

  // ----- snap manuale: trova il video più vicino al centro e scrolla ad esso -----
  let scrollTimer = null;
  let isAutoScrolling = false;

  function snapToNearest() {
    if (isAutoScrolling) return;
    const slides = feed.querySelectorAll('.slide');
    const viewportCenter = window.scrollY + window.innerHeight / 2;
    let closest = null;
    let minDist = Infinity;

    slides.forEach(slide => {
      const rect = slide.getBoundingClientRect();
      const slideCenter = window.scrollY + rect.top + rect.height / 2;
      const dist = Math.abs(slideCenter - viewportCenter);
      if (dist < minDist) {
        minDist = dist;
        closest = slideCenter;
      }
    });

    if (closest !== null) {
      const targetY = closest - window.innerHeight / 2;
      isAutoScrolling = true;
      window.scrollTo({ top: targetY, behavior: 'smooth' });
      setTimeout(() => { isAutoScrolling = false; }, 600);
    }
  }

  window.addEventListener('scroll', () => {
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(snapToNearest, 120);
  }, { passive: true });

  // ----- autoscroll lento verso il basso -----
  let autoScrollPaused = false;
  let userScrollTimer = null;

  function autoScroll() {
    if (!autoScrollPaused) {
      window.scrollBy({ top: 0.6, behavior: 'instant' });
    }
    requestAnimationFrame(autoScroll);
  }

  // pausa l'autoscroll quando l'utente tocca/scrolla
  window.addEventListener('touchstart', () => {
    autoScrollPaused = true;
    clearTimeout(userScrollTimer);
  }, { passive: true });

  window.addEventListener('touchend', () => {
    userScrollTimer = setTimeout(() => {
      autoScrollPaused = false;
    }, 2000); // riprende 2s dopo che l'utente smette di toccare
  }, { passive: true });

  requestAnimationFrame(autoScroll);
</script>

</body>
</html>

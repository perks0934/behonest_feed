<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title></title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  html, body {
    width: 100%;
    background: #000;
  }

  #feed {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .slide video {
    width: 100%;
    height: auto;
    display: block;
  }
</style>
</head>
<body>

<div id="feed">

  <div class="slide">
    <video src="bh_clip00028788.mov" muted loop playsinline></video>
  </div>

  <div class="slide">
    <video src="bh_clip00029150.mov" muted loop playsinline></video>
  </div>

  <div class="slide">
    <video src="bh_clip00030078.mov" muted loop playsinline></video>
  </div>

  <div class="slide">
    <video src="bh_clip00062196.mov" muted loop playsinline></video>
  </div>

</div>

<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const video = entry.target.querySelector('video');
      if (!video) return;
      if (entry.isIntersecting) {
        video.play().catch(() => {});
      } else {
        video.pause();
        video.currentTime = 0;
      }
    });
  }, { threshold: 0.3 });

  document.querySelectorAll('.slide').forEach(slide => observer.observe(slide));
</script>

</body>
</html>
